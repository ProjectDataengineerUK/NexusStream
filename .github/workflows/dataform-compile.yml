name: Dataform Run
on:
  push:
    branches: [ main ]

jobs:
  dataform_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Autenticação no GCP usando sua SA_KEY
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. Setup do Cloud SDK para usar o Project ID
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: '${{ secrets.GCP_PROJECT_ID }}'

      # 3. Exemplo de uso da API do OpenWeather (via Python/Node)
      - name: Fetch Weather Data
        env:
          WEATHER_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          echo "Executando script de ingestão de clima..."
          # Aqui entraria seu script de python ou curl

      # 4. Execução do Dataform
      - name: Run Dataform
        run: |
          npm install -g @dataform/cli
          dataform run --project ${{ secrets.GCP_PROJECT_ID }}