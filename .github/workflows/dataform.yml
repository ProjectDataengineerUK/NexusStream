name: Dataform Remote Trigger
on:
  push:
    branches: [ main ]

jobs:
  trigger_dataform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Autenticação
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. Setup do Cloud SDK (Necessário apenas para gerar o token de acesso)
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 3. Disparo da Invocação via API (A solução definitiva)
      - name: Create Dataform Workflow Invocation
        run: |
          # 1. Gera o token dinamicamente
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          
          # 2. Define o caminho do repositório
          REPO_PATH="projects/${{ secrets.GCP_PROJECT_ID }}/locations/southamerica-east1/repositories/nexus-repository"
          
          echo "Disparando API para: $REPO_PATH"

          # 3. Faz o POST direto na API do GCP
          curl -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "workflowInvocationConfig": {
                "compilationConfig": {
                  "gitCommitish": "main"
                }
              }
            }' \
            "https://dataform.googleapis.com/v1beta1/$REPO_PATH/workflowInvocations"