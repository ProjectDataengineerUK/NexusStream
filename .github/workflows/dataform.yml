name: Dataform Remote Trigger
on:
  push:
    branches: [ main ]

jobs:
  trigger_dataform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Autenticação no GCP
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. Setup do Cloud SDK
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 3. Compilação e Invocação via API
      - name: Create Dataform Workflow
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          REGION="southamerica-east1"
          REPO_ID="nexus-repository"
          REPO_PATH="projects/$PROJECT_ID/locations/$REGION/repositories/$REPO_ID"
          
          SERVICE_ACCOUNT_EMAIL="nexus-stream-sa@nexus-stream-project.iam.gserviceaccount.com"

          echo "------------------------------------------------"
          echo "Iniciando processo para: $REPO_PATH"
          echo "------------------------------------------------"

          # PASSO 1: Criar o Resultado de Compilação
          echo "Criando Compilation Result..."
          COMPILATION_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"gitCommitish\": \"main\"}" \
            "https://dataform.googleapis.com/v1beta1/$REPO_PATH/compilationResults")

          COMPILATION_NAME=$(echo $COMPILATION_RESPONSE | jq -r .name)

          if [ "$COMPILATION_NAME" == "null" ] || [ -z "$COMPILATION_NAME" ]; then
            echo "Erro na compilação: $COMPILATION_RESPONSE"
            exit 1
          fi

          echo "Compilação bem-sucedida: $COMPILATION_NAME"

          # PASSO 2: Invocação
          echo "Preparando Invocação..."
          
          # Criando o JSON via printf para evitar problemas de identação com heredocs (EOF)
          INVOCATION_JSON=$(printf '{"compilationResult":"%s","invocationConfig":{"serviceAccount":"%s"}}' "$COMPILATION_NAME" "$SERVICE_ACCOUNT_EMAIL")

          echo "Disparando Workflow Invocation..."
          INVOCATION_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$INVOCATION_JSON" \
            "https://dataform.googleapis.com/v1beta1/$REPO_PATH/workflowInvocations")

          echo "Resposta da API de Invocação: $INVOCATION_RESPONSE"
          
          INVOCATION_ID=$(echo $INVOCATION_RESPONSE | jq -r .name)
          
          if [ "$INVOCATION_ID" == "null" ] || [ -z "$INVOCATION_ID" ]; then
             echo "ERRO CRÍTICO: Não foi possível disparar a execução."
             exit 1
          fi

          echo "Workflow disparado com sucesso! ID: $INVOCATION_ID"