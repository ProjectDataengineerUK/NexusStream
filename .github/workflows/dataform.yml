name: Dataform Remote Trigger
on:
  push:
    branches: [ main ]

jobs:
  trigger_dataform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # DEBUG: Verifica se os arquivos estão na raiz do Runner do GitHub
      - name: List files in runner
        run: |
          echo "Verificando arquivos no repositório antes do disparo:"
          ls -R

      # 1. Autenticação
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. Setup do Cloud SDK
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 3. Compilação e Invocação via API
      - name: Create Dataform Workflow
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          REGION="southamerica-east1"
          REPO_ID="nexus-repository"
          REPO_PATH="projects/$PROJECT_ID/locations/$REGION/repositories/$REPO_ID"

          echo "------------------------------------------------"
          echo "Iniciando processo para: $REPO_PATH"
          echo "Branch: main"
          echo "------------------------------------------------"

          # PASSO 1: Criar o Resultado de Compilação
          echo "Criando Compilation Result..."
          # Removido o -s (silent) do curl para ver cabeçalhos de erro se necessário
          COMPILATION_RESPONSE=$(curl -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "gitCommitish": "main"
            }' \
            "https://dataform.googleapis.com/v1beta1/$REPO_PATH/compilationResults")

          # Log da resposta completa para inspeção
          echo "Resposta da API de Compilação: $COMPILATION_RESPONSE"

          COMPILATION_NAME=$(echo $COMPILATION_RESPONSE | jq -r .name)

          if [ "$COMPILATION_NAME" == "null" ] || [ -z "$COMPILATION_NAME" ]; then
            echo "CRITICAL ERROR: A compilação falhou. Verifique se o Dataform tem acesso ao Git."
            # Verifica se o erro é o específico de package.json
            ERROR_MSG=$(echo $COMPILATION_RESPONSE | jq -r .error.message)
            echo "Mensagem de Erro do Google: $ERROR_MSG"
            exit 1
          fi

          echo "Compilação bem-sucedida: $COMPILATION_NAME"

          # PASSO 2: Criar a Invocação do Workflow
          echo "Disparando Workflow Invocation..."
          INVOCATION_RESPONSE=$(curl -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"compilationResult\": \"$COMPILATION_NAME\"
            }" \
            "https://dataform.googleapis.com/v1beta1/$REPO_PATH/workflowInvocations")

          echo "Resposta da API de Invocação: $INVOCATION_RESPONSE"
          
          INVOCATION_ID=$(echo $INVOCATION_RESPONSE | jq -r .name)
          
          if [ "$INVOCATION_ID" == "null" ]; then
             echo "Erro ao disparar execução!"
             exit 1
          fi

          echo "Workflow disparado com sucesso! ID: $INVOCATION_ID"