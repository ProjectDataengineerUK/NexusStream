name: Dataform Remote Trigger
on:
  push:
    branches: [ main ]

jobs:
  trigger_dataform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Autenticação
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. Setup do Cloud SDK
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 3. Disparo da Invocação via Gcloud Beta
      - name: Create Dataform Workflow Invocation
        run: |
          # Instala o componente beta sem pedir interação do usuário
          gcloud components install beta --quiet

          # Executa a invocação com --quiet para aceitar confirmações automáticas
          gcloud beta dataform workflows invocations create \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --location=southamerica-east1 \
            --repository=nexus-repository \
            --workflow-invocation-config='{"compilationConfig": {"gitCommitish": "main"}}' \
            --quiet