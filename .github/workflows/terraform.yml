name: 'Terraform CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  id-token: write 

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    # Verifique se esses segredos existem exatamente com esses nomes no GitHub
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_weather_api_token: ${{ secrets.OPENWEATHER_API_KEY }}
      TF_VAR_dataform_github_token: ${{ secrets.DATAFORM_GITHUB_TOKEN }}
      TF_VAR_region: "southamerica-east1"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        # Crucial: se o segredo GCP_SA_KEY não existir, este passo falha
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform

    - name: Terraform Plan
      run: terraform plan -input=false
      working-directory: ./terraform

    - name: Terraform Apply
      # Só roda o Apply se o Plan passar e estivermos no branch main
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false
      working-directory: ./terraform